# Nginx Configuration for Rental Management System
# Place this file in your existing Nginx sites-available directory
# Then create a symlink to sites-enabled and reload Nginx

# Upstream definition for the application
upstream rental_app {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 80;
    # Change this to your domain
    server_name rental.yourdomain.com;

    # Redirect to HTTPS (if SSL is configured)
    # return 301 https://$server_name$request_uri;

    # Maximum upload size (for file uploads)
    client_max_body_size 10M;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket headers (for real-time features if needed)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Proxy timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # API endpoints
    location /api {
        proxy_pass http://rental_app;

        # CORS headers (if needed)
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # FastAPI documentation
    location /docs {
        proxy_pass http://rental_app/docs;
    }

    location /redoc {
        proxy_pass http://rental_app/redoc;
    }

    location /openapi.json {
        proxy_pass http://rental_app/openapi.json;
    }

    # Static files and React app
    location / {
        proxy_pass http://rental_app;

        # Cache static assets
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://rental_app;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logs (optional - customize path)
    access_log /var/log/nginx/rental_access.log;
    error_log /var/log/nginx/rental_error.log;
}

