[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/var/log/nginx/stdout.log
stderr_logfile=/var/log/nginx/stderr.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB

[program:fastapi]
directory=/app/backend
command=uvicorn server:app --host 127.0.0.1 --port 8001 --workers 4
autostart=true
autorestart=true
stdout_logfile=/var/log/fastapi/stdout.log
stderr_logfile=/var/log/fastapi/stderr.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
environment=PATH="/usr/local/bin:%(ENV_PATH)s",PYTHONPATH="/app/backend"

[group:rental-app]
programs=nginx,fastapi
priority=999